[theme]
base = "light"
primaryColor = "#FF6B35"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"
textColor = "#1F2937"
font = "sans serif"

[server]
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"   # "minimal" hides Deploy button; "viewer" hides menu entirely
